<!DOCTYPE html> <!--esto para decirle al navegador que es un documento HTML5-->
<html lang="en"> <!--es para decirle al navegador que el idioma del documento es ingles-->
<head>
    <title>Listas</title> <!--titulo de la pagina, se muestra en la pestaña del navegador-->
</head>
<body> <!--etiqueta que contiene el contenido visible de la pagina, como texto, imagenes, enlaces, etc.-->
    <ul> <!--ul es para crear una (urdened) lista desordenada, es decir, con viñetas-->
        <li>Elemento 1</li> <!--li es para crear un elemento de la lista-->
        <li>Elemento 2</li>
        <li>Elemento 3</li>
    </ul>
    <ol> <!--ol es para crear una (ordered) lista ordenada, es decir, con números-->
        <li>Elemento 1</li> <!--li es para crear un elemento de la lista-->
        <li>Elemento 2</li>
        <li>Elemento 3</li>
    </ol>
</body>
</html>
