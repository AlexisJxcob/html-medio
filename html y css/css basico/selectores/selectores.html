<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selectores en CSS</title>
    <link rel="stylesheet" href="styles.css"> <!--esto es un ejemplo de css externo. RECOMENDADA PARA PROYECTOS GRANDES -->
</head>
<body>
    <h1>CSS</h1>
    <p style="color: blue; font-family: Arial, sans-serif;">css significa Cascading Style Sheets</p> <!--esto es un ejemplo de css en línea. NO RECOMENDADA -->

    <h2>Tipos de CSS</h2>
    <ul>
        <li>CSS en línea</li>
        <li>CSS interno</li>
        <li>CSS externo</li>
    </ul>

    <!--esto es un ejemplo de css interno. RECOMENDADA PARA PROYECTOS PEQUEÑOS -->
    <style> 
        h1{
            color: red;
            font-size: 24px;
        }
        h2{
            color: green;
            font-size: 20px;
        }
    </style>

    <h3>CSS en línea</h3>
    <ol>
        <li>Se escribe dentro de la etiqueta HTML</li>
        <li>Se utiliza el atributo "style"</li>
        <li>Ejemplo: <code>&lt;h1 style="color: blue;"&gt;Título&lt;/h1&gt;</code></li>
    </ol>
</body>
</html>
