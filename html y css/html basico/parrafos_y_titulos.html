<!DOCTYPE html> <!--esto para decirle al navegador que es un documento HTML5-->
<html> <!--etiqueta raiz del documento HTML, todo el contenido va dentro de esta etiqueta-->
    <head> <!--etiqueta que contiene la informacion del documento, como el titulo, metadatos, enlaces a hojas de estilo, etc.-->
        <title>receta</title> <!--titulo de la pagina, se muestra en la pestaña del navegador-->
    </head>
    <body> <!--etiqueta que contiene el contenido visible de la pagina, como texto, imagenes, enlaces, etc.-->
        <h1>receta 1</h1> <!--h1 es el encabezado mas grande, se usa para titulos principales-->
        <h2>receta 2</h2>
        <h3>receta 3</h3>
        <h4>receta 4</h4>
        <h5>receta 5</h5>
        <h6>receta 6</h6> <!--h6 es el encabezado mas pequeño, se usa para titulos secundarios-->
        <p>
            Lorem ipsum dolor sit amet consectetur, adipisicing elit. Similique, omnis. Impedit laudantium voluptatibus dolorem? Iste quaerat pariatur quam quasi dolores, corporis sequi itaque molestiae iusto fuga commodi eos impedit accusamus.
        </p>
    </body>
</html>
