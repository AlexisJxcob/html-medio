<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Enlaces</title>
    </head>
    
    <body>
        <h1>Una Web con Enlaces</h1> <!--h1 es el encabezado mas grande, se usa para titulos principales-->
        <h2>Enlaces</h2>
        <a href="enlaces2.html" title="Enlaces 2">Enlaces </a> <!--esto es para crear un enlace, el atributo href es para especificar la ruta del enlace y el title es para especificar un texto que se muestra al pasar el mouse sobre el enlace-->
        <a href="enlaces3.html" title="Enlaces 3">Enlaces 3</a>
        <h2>Enlaces con Target</h2> <!--h2 es un encabezado, se usa para subtítulos-->
        <a href="enlaces2.html" target="_blank" title="Enlaces 2 (Nueva Pestaña)">Enlaces 2 (Nueva Pestaña)</a> <!--esto es para abrir el enlace en una nueva pestaña del navegador-->
    </body>
</html>
