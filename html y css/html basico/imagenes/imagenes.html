<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--esto es para que la pagina se vea bien en dispositivos moviles, el atributo charset es para especificar la codificacion de caracteres, en este caso UTF-8 que es la mas comun-->
    <title>Imagenes</title>
</head>
<body> <!--etiqueta que contiene el contenido visible de la pagina, como texto, imagenes, enlaces, etc.-->
    <img src="gojo_vs_sukuna.jpg" alt="Pelea de Gojo vs Sukuna" title="Pelea de Gojo vs Sukuna"> <!--esto es para insertar una imagen, el atributo src es para especificar la ruta de la imagen, el atributo alt es para especificar un texto alternativo en caso de que la imagen no se pueda cargar y el title es para especificar un texto que se muestra al pasar el mouse sobre la imagen-->
</body>
</html>
